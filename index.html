<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos JavaScript</title>
</head>
<body>
    <h1>Objetos JavaScript</h1>

    <script>
        const pessoa = {
            nome: "João",
            idade: 30,
            saudacao: function() {
                console.log("Olá, meu nome é " + this.nome);
            }
        };

        pessoa.saudacao();
    </script>
</body>
</html>
